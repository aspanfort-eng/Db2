<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototipo Lámpara Sonómetro - Amortiguado</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: rgb(254, 249, 195);
            color: #121212;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 80px 20px;
            box-sizing: border-box;
            transition: background-color 0.15s ease-out; /* Transición un pelín más sutil */
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        .cabecera h1 {
            font-size: 2rem;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.5px;
            opacity: 0.9;
        }

        #startBtn {
            background-color: #121212;
            color: #ffffff;
            border: none;
            padding: 16px 32px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 999;
        }

        .interfaz-inferior {
            width: 100%;
            max-width: 450px;
            margin-bottom: 40px;
            position: relative;
        }

        .barra-contenedor {
            position: relative;
            width: 100%;
            height: 12px;
            background-color: rgba(0, 0, 0, 0.08);
            border-radius: 6px;
        }

        .barra-progreso {
            height: 100%;
            width: 0%; 
            background-color: #121212; 
            border-radius: 6px;
            transition: width 0.1s linear; /* Movimiento de barra más orgánico */
        }

        .controlador {
            position: absolute;
            top: -4px; 
            width: 20px;
            height: 20px;
            transform: translateX(-50%);
            cursor: ew-resize; 
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .controlador::before {
            content: '';
            width: 2px;
            height: 20px;
            background-color: rgba(0, 0, 0, 0.3);
            position: absolute;
            top: 0;
        }

        .controlador::after {
            content: '';
            width: 10px;
            height: 10px;
            background-color: #121212;
            border-radius: 50%;
            position: absolute;
            bottom: -14px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="cabecera">
        <h1>Contador de decibelios</h1>
    </div>

    <button id="startBtn" onclick="arrancarSonometro()">Activar</button>

    <div class="interfaz-inferior">
        <div class="barra-contenedor" id="barraBase">
            <div id="progreso" class="barra-progreso"></div>
        </div>
        
        <div id="ctrlNaranja" class="controlador" style="left: 61.1%;"></div>
        <div id="ctrlRojo" class="controlador" style="left: 77.7%;"></div>
    </div>

    <script>
        let limiteNaranja = 55; 
        let limiteRojo = 70;

        const AMARILLO_CLARO = { r: 254, g: 249, b: 195 }; 
        const NARANJA = { r: 230, g: 126, b: 34 };
        const ROJO = { r: 231, g: 76, b: 60 };

        const barraBase = document.getElementById('barraBase');
        const ctrlNaranja = document.getElementById('ctrlNaranja');
        const ctrlRojo = document.getElementById('ctrlRojo');
        const barraProgreso = document.getElementById('progreso');
        const cuerpo = document.body;

        // Guardamos el último valor de decibelios para hacer la media amortiguada
        let dbSuave = 35; 

        function modoArrastrar(elemento, esNaranja) {
            elemento.addEventListener('mousedown', function(e) {
                e.preventDefault();
                function moviendo(evento) {
                    const rect = barraBase.getBoundingClientRect();
                    let x = evento.clientX - rect.left;
                    let porcentaje = (x / rect.width) * 100;
                    
                    if (porcentaje < 0) porcentaje = 0;
                    if (porcentaje > 100) porcentaje = 100;

                    let valorDb = Math.round((porcentaje / 100) * 90);

                    if (esNaranja) {
                        if (valorDb >= limiteRojo) valorDb = limiteRojo - 1;
                        limiteNaranja = valorDb;
                        elemento.style.left = ((limiteNaranja / 90) * 100) + '%';
                    } else {
                        if (valorDb <= limiteNaranja) valorDb = limiteNaranja + 1;
                        limiteRojo = valorDb;
                        elemento.style.left = ((limiteRojo / 90) * 100) + '%';
                    }
                }
                function soltar() {
                    document.removeEventListener('mousemove', moviendo);
                    document.removeEventListener('mouseup', soltar);
                }
                document.addEventListener('mousemove', moviendo);
                document.addEventListener('mouseup', soltar);
            });
        }

        modoArrastrar(ctrlNaranja, true);
        modoArrastrar(ctrlRojo, false);

        function arrancarSonometro() {
            document.getElementById('startBtn').style.display = 'none';

            navigator.mediaDevices.getUserMedia({ audio: true })
            .then(function(stream) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const audioContext = new AudioContext();
                
                const source = audioContext.createMediaStreamSource(stream);
                const processor = audioContext.createScriptProcessor(2048, 1, 1);

                source.connect(processor);
                processor.connect(audioContext.destination);

                processor.onaudioprocess = function(audioProcessingEvent) {
                    const inputBuffer = audioProcessingEvent.inputBuffer;
                    const inputData = inputBuffer.getChannelData(0);
                    const bufferLength = inputBuffer.length;
                    
                    let sum = 0;
                    for (let i = 0; i < bufferLength; i++) {
                        sum += inputData[i] * inputData[i];
                    }
                    let rms = Math.sqrt(sum / bufferLength);

                    let dbValue = 20 * Math.log10(rms);
                    let dbReal = Math.round(dbValue + 83); // Calibración de sensibilidad general

                    if (dbReal < 0 || isNaN(dbReal) || !isFinite(dbReal)) dbReal = 0;
                    if (dbReal > 90) dbReal = 90;

                    // ------ EL SECRETO DEL AMORTIGUADOR ------
                    // factorSuave controla la velocidad: un valor bajo (0.07) hace que ignore los picos rápidos
                    // y requiera mantener el volumen alto para que la barra suba.
                    let factorSuave = 0.07; 
                    dbSuave = (dbReal * factorSuave) + (dbSuave * (1 - factorSuave));

                    // Usamos el valor suavizado para la interfaz
                    let porcentajeBarra = (dbSuave / 90) * 100;
                    barraProgreso.style.width = porcentajeBarra + "%";

                    let colorFinal = `rgb(${AMARILLO_CLARO.r}, ${AMARILLO_CLARO.g}, ${AMARILLO_CLARO.b})`;

                    if (dbSuave <= limiteNaranja) {
                        colorFinal = `rgb(${AMARILLO_CLARO.r}, ${AMARILLO_CLARO.g}, ${AMARILLO_CLARO.b})`;
                    } 
                    else if (dbSuave > limiteNaranja && dbSuave < ((limiteNaranja + limiteRojo) / 2)) {
                        let puntoMedio = (limiteNaranja + limiteRojo) / 2;
                        let factor = (dbSuave - limiteNaranja) / (puntoMedio - limiteNaranja);
                        let r = Math.round(AMARILLO_CLARO.r + factor * (NARANJA.r - AMARILLO_CLARO.r));
                        let g = Math.round(AMARILLO_CLARO.g + factor * (NARANJA.g - AMARILLO_CLARO.g));
                        let b = Math.round(AMARILLO_CLARO.b + factor * (NARANJA.b - AMARILLO_CLARO.b));
                        colorFinal = `rgb(${r}, ${g}, ${b})`;
                    } 
                    else if (dbSuave >= ((limiteNaranja + limiteRojo) / 2) && dbSuave < limiteRojo) {
                        let puntoMedio = (limiteNaranja + limiteRojo) / 2;
                        let factor = (dbSuave - puntoMedio) / (limiteRojo - puntoMedio);
                        let r = Math.round(NARANJA.r + factor * (ROJO.r - NARANJA.r));
                        let g = Math.round(NARANJA.g + factor * (ROJO.g - NARANJA.g));
                        let b = Math.round(NARANJA.b + factor * (ROJO.b - NARANJA.b));
                        colorFinal = `rgb(${r}, ${g}, ${b})`;
                    } 
                    else {
                        colorFinal = `rgb(${ROJO.r}, ${ROJO.g}, ${ROJO.b})`;
                    }

                    cuerpo.style.backgroundColor = colorFinal;
                };
            })
            .catch(function(err) {
                alert('No se ha podido conectar el micrófono.');
                console.error(err);
            });
        }
    </script>
</body>
</html>
